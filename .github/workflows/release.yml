name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          # macOS: add x86_64 so bundle-macos.sh can build a universal app.
          targets: ${{ runner.os == 'macOS' && 'x86_64-apple-darwin,aarch64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2

      - name: install GUI build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev libgtk-3-dev \
            libfuse2 file

      # ====================================================================
      # Linux: AppImage (one-click) + CLI/registry tarball
      # ====================================================================
      - name: package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
        run: |
          mkdir -p out
          # Fetch linuxdeploy so the AppImage bundles its shared libraries.
          sudo curl -fsSL -o /usr/local/bin/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          sudo chmod +x /usr/local/bin/linuxdeploy
          bash scripts/bundle-linux.sh dist
          cp dist/Noema-Atlas-x86_64.AppImage "out/Noema-Atlas-x86_64.AppImage"
          # Raw binaries as a fallback for headless/server boxes.
          cargo build --release --workspace
          tar -C target/release -czf "out/noema-atlas-${{ matrix.target }}.tar.gz" \
            noema noema-desktop noema-registry

      # ====================================================================
      # macOS: signed + notarized .dmg (one-click) + CLI tarball
      # ====================================================================
      - name: import signing certificate (macOS)
        if: runner.os == 'macOS'
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          if [ -z "$MACOS_CERT_P12" ]; then
            echo "No MACOS_CERT_P12 secret set — the app will be ad-hoc signed (not notarized)."
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"

      - name: package (macOS)
        if: runner.os == 'macOS'
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          mkdir -p out
          # Universal (arm64 + x86_64) app, packaged as a drag-to-install dmg.
          # Signed + notarized when the secrets above are present.
          bash scripts/bundle-macos.sh --universal --dmg dist
          cp "dist/Noema-Atlas-macos-universal.dmg" "out/Noema-Atlas-macos.dmg"
          # CLI/registry tarball (host arch) for terminal users.
          cargo build --release -p noema-cli -p noema-registry
          tar -C target/release -czf "out/noema-atlas-${{ matrix.target }}-cli.tar.gz" \
            noema noema-registry

      # ====================================================================
      # Windows: NSIS installer (one-click) + portable zip
      # ====================================================================
      - name: install NSIS (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y --no-progress
          # choco's shim dir is already on PATH, but make sure makensis resolves.
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX_PATH }}
          WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          ./scripts/bundle-windows.ps1 -OutDir dist
          # Fail loudly if the installer wasn't produced — a release must not ship
          # with just the portable zip while the README tells users to run the .exe.
          if (-not (Test-Path "dist/Noema-Atlas-Setup.exe")) {
            throw "Noema-Atlas-Setup.exe was not produced (makensis missing or failed)."
          }
          Copy-Item "dist/Noema-Atlas-Setup.exe" "out/Noema-Atlas-Setup.exe"
          Copy-Item "dist/Noema-Atlas-windows-x86_64.zip" "out/Noema-Atlas-windows-x86_64.zip"

      # ====================================================================
      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: noema-atlas-${{ matrix.target }}
          path: out/*
