name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  package:
    name: package (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: install GUI build deps (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libxcb-render0-dev libxcb-shape0-dev \
            libxcb-xfixes0-dev libxkbcommon-dev libwayland-dev libgtk-3-dev \
            libfuse2 file

      # ====================================================================
      # Linux: AppImage (one-click) + CLI/registry tarball
      # ====================================================================
      - name: package (Linux)
        if: runner.os == 'Linux'
        env:
          APPIMAGE_EXTRACT_AND_RUN: "1"
          # Pinned sha256 of linuxdeploy-x86_64.AppImage. This tool runs (as root)
          # as the AppImage builder, so its bytes are part of the release supply
          # chain and must be verified before exec. The upstream `continuous` asset
          # is mutable: when a new build is published this check fails closed and
          # prints the actual hash — review the new build, then bump this value
          # deliberately rather than trusting whatever is served at fetch time.
          LINUXDEPLOY_SHA256: "514d4ffe2a2f757369b41863a4f63fbbb222c429652803ebc081cb16ba21ac25"
        run: |
          mkdir -p out
          # Fetch linuxdeploy (bundles the app's shared libraries), verify it, then
          # install it — never chmod+exec an unverified network download.
          curl -fsSL -o /tmp/linuxdeploy \
            https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          echo "${LINUXDEPLOY_SHA256}  /tmp/linuxdeploy" | sha256sum -c - || {
            echo "linuxdeploy checksum mismatch — refusing to run it. actual:";
            sha256sum /tmp/linuxdeploy;
            exit 1;
          }
          sudo install -m 0755 /tmp/linuxdeploy /usr/local/bin/linuxdeploy
          bash scripts/bundle-linux.sh dist
          cp dist/Noema-Atlas-x86_64.AppImage "out/Noema-Atlas-x86_64.AppImage"
          # Raw binaries as a fallback for headless/server boxes.
          cargo build --release --workspace
          tar -C target/release -czf "out/noema-atlas-${{ matrix.target }}.tar.gz" \
            noema noema-desktop noema-registry

      # macOS builds are produced and notarized locally, not in CI.

      # ====================================================================
      # Windows: NSIS installer (one-click) + portable zip
      # ====================================================================
      - name: install NSIS (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install nsis -y --no-progress
          # choco's shim dir is already on PATH, but make sure makensis resolves.
          if (-not (Get-Command makensis -ErrorAction SilentlyContinue)) {
            "C:\Program Files (x86)\NSIS" | Out-File -FilePath $env:GITHUB_PATH -Append
          }

      - name: package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          WIN_CERT_PFX: ${{ secrets.WINDOWS_CERT_PFX_PATH }}
          WIN_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
        run: |
          New-Item -ItemType Directory -Force -Path out | Out-Null
          ./scripts/bundle-windows.ps1 -OutDir dist
          # Fail loudly if the installer wasn't produced — a release must not ship
          # with just the portable zip while the README tells users to run the .exe.
          if (-not (Test-Path "dist/Noema-Atlas-Setup.exe")) {
            throw "Noema-Atlas-Setup.exe was not produced (makensis missing or failed)."
          }
          Copy-Item "dist/Noema-Atlas-Setup.exe" "out/Noema-Atlas-Setup.exe"
          Copy-Item "dist/Noema-Atlas-windows-x86_64.zip" "out/Noema-Atlas-windows-x86_64.zip"

      # ====================================================================
      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: noema-atlas-${{ matrix.target }}
          path: out/*
