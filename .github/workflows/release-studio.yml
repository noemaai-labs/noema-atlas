name: Release Studio

# Builds Noema Studio (the Tauri app) for Linux and Windows on a tag push and
# attaches the installers to the same GitHub release as the Desktop build (see
# release.yml). macOS builds are produced and notarized locally, not in CI.
#
# Studio is its own workspace pinned to rustc >= 1.88; current stable on the
# GitHub runners clears that, so `dtolnay/rust-toolchain@stable` is enough.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      os:
        description: "Which OS to build on a manual run"
        type: choice
        options: [all, linux, windows]
        default: all

permissions:
  contents: write

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.m.outputs.matrix }}
    steps:
      - id: m
        shell: bash
        run: |
          sel="${{ github.event.inputs.os || 'all' }}"
          linux='{"os":"ubuntu-latest","target":"linux"}'
          windows='{"os":"windows-latest","target":"windows"}'
          case "$sel" in
            linux)   inc="[$linux]" ;;
            windows) inc="[$windows]" ;;
            *)       inc="[$linux,$windows]" ;;
          esac
          echo "matrix={\"include\":$inc}" >> "$GITHUB_OUTPUT"

  studio:
    needs: setup
    name: studio (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/studio

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libayatana-appindicator3-dev patchelf libfuse2 file

      - name: install front-end dependencies
        working-directory: crates/studio
        run: npm --prefix ui ci

      - name: install tauri-cli
        # Pin to an exact version (matches the tauri 2.11.x runtime). A floating
        # "^2" would auto-pull any future 2.x — including a malicious crates.io
        # release — and that binary runs `cargo tauri build` with the updater
        # signing key in its environment. Bump this deliberately on a tauri upgrade.
        run: cargo install tauri-cli --version =2.11.3 --locked

      # macOS builds are produced and notarized locally, not in CI.
      - name: build Studio (Linux / Windows)
        working-directory: crates/studio
        env:
          # Signs the updater artifacts (.sig files + the platform bundles). Without
          # these the bundler emits no signatures and Studio auto-update is inert.
          # `createUpdaterArtifacts: true` in tauri.conf.json triggers the artifacts.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            # WiX/MSI rejects semver prerelease identifiers such as `alpha.2`.
            # NSIS supports them and is the Windows updater artifact we publish.
            cargo tauri build --features custom-protocol --bundles nsis
          else
            cargo tauri build --features custom-protocol
          fi

      - name: collect installers
        shell: bash
        run: |
          mkdir -p out
          # Also gather the auto-updater artifacts: the detached `*.sig` signatures
          # and (on macOS, built locally) the `*.app.tar.gz` the Tauri updater
          # consumes. Without the .sig files the updater rejects every update.
          find crates/studio/target -path '*/release/bundle/*' \
            \( -name '*.dmg' -o -name '*.AppImage' -o -name '*.deb' \
               -o -name '*.msi' -o -name '*.exe' \
               -o -name '*.sig' -o -name '*.app.tar.gz' \) \
            -exec sh -c 'cp "$1" "out/$(basename "$1")"' _ {} \;
          echo "Collected:" && ls -la out

      - name: upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: out/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: upload artifacts (non-tag runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: noema-studio-${{ matrix.target }}
          path: out/*
