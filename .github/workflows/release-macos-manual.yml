name: Release macOS (manual)

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing public release tag to build and upload
        required: true
        type: string
      target:
        description: macOS product to build
        required: true
        default: all
        type: choice
        options:
          - all
          - atlas
          - atlas-package
          - studio
      artifact_run_id:
        description: Prior workflow run containing noema-atlas-macos-stapled
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-macos-${{ inputs.release_tag }}
  cancel-in-progress: false

jobs:
  atlas:
    name: Atlas macOS universal
    if: inputs.target == 'all' || inputs.target == 'atlas'
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          test -n "$MACOS_CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/noema-build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/noema-cert.p12"
          security import "$RUNNER_TEMP/noema-cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/noema-cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build, sign, and notarize Atlas
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          test -n "$SIGN_IDENTITY"
          test -n "$NOTARY_APPLE_ID"
          test -n "$NOTARY_PASSWORD"
          test -n "$NOTARY_TEAM_ID"

          bash scripts/bundle-macos.sh --universal dist
          APP="dist/Noema Atlas.app"
          codesign --verify --deep --strict --verbose=2 "$APP"

          APP_SUBMISSION="$RUNNER_TEMP/Noema-Atlas-app.zip"
          ditto -c -k --keepParent "$APP" "$APP_SUBMISSION"
          xcrun notarytool submit "$APP_SUBMISSION" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

          ZIP="dist/Noema-Atlas-macos-universal.zip"
          ditto -c -k --keepParent "$APP" "$ZIP"
          file "$APP/Contents/MacOS/noema-desktop"

      - name: Store stapled Atlas app
        uses: actions/upload-artifact@v4
        with:
          name: noema-atlas-macos-stapled
          path: dist/Noema-Atlas-macos-universal.zip
          compression-level: 0
          retention-days: 1

  atlas-package:
    name: Atlas macOS DMG and release upload
    if: inputs.target == 'all' || inputs.target == 'atlas'
    needs: atlas
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: noema-atlas-macos-stapled
          path: dist

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          test -n "$MACOS_CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/noema-build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/noema-cert.p12"
          security import "$RUNNER_TEMP/noema-cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/noema-cert.p12"

      - name: Build and notarize Atlas DMG
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          test -n "$SIGN_IDENTITY"
          test -n "$NOTARY_APPLE_ID"
          test -n "$NOTARY_PASSWORD"
          test -n "$NOTARY_TEAM_ID"

          EXTRACTED="$RUNNER_TEMP/atlas-app"
          mkdir -p "$EXTRACTED"
          ditto -x -k dist/Noema-Atlas-macos-universal.zip "$EXTRACTED"
          APP="$EXTRACTED/Noema Atlas.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          xcrun stapler validate "$APP"

          STAGING="$RUNNER_TEMP/atlas-dmg"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Noema Atlas.app"
          ln -s /Applications "$STAGING/Applications"
          DMG="dist/Noema-Atlas-macos-universal.dmg"
          hdiutil create -volname "Noema Atlas" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          codesign --force --sign "$SIGN_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -vv --type open --context context:primary-signature "$DMG"

      - name: Upload Atlas macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/Noema-Atlas-macos-universal.dmg \
            dist/Noema-Atlas-macos-universal.zip \
            --repo noemaai-labs/noema-atlas \
            --clobber

  atlas-package-only:
    name: Atlas macOS package-only recovery
    if: inputs.target == 'atlas-package'
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Download stapled Atlas app from prior run
        env:
          GH_TOKEN: ${{ github.token }}
          ARTIFACT_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          test -n "$ARTIFACT_RUN_ID"
          mkdir -p dist
          gh run download "$ARTIFACT_RUN_ID" \
            --repo noemaai-labs/noema-atlas \
            --name noema-atlas-macos-stapled \
            --dir dist

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          test -n "$MACOS_CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/noema-build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/noema-cert.p12"
          security import "$RUNNER_TEMP/noema-cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/noema-cert.p12"

      - name: Build and notarize Atlas DMG
        env:
          SIGN_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          test -n "$SIGN_IDENTITY"
          test -n "$NOTARY_APPLE_ID"
          test -n "$NOTARY_PASSWORD"
          test -n "$NOTARY_TEAM_ID"

          EXTRACTED="$RUNNER_TEMP/atlas-app"
          mkdir -p "$EXTRACTED"
          ditto -x -k dist/Noema-Atlas-macos-universal.zip "$EXTRACTED"
          APP="$EXTRACTED/Noema Atlas.app"
          codesign --verify --deep --strict --verbose=2 "$APP"
          xcrun stapler validate "$APP"

          STAGING="$RUNNER_TEMP/atlas-dmg"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Noema Atlas.app"
          ln -s /Applications "$STAGING/Applications"
          DMG="dist/Noema-Atlas-macos-universal.dmg"
          hdiutil create -volname "Noema Atlas" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          codesign --force --sign "$SIGN_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -vv --type open --context context:primary-signature "$DMG"

      - name: Upload Atlas macOS assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            dist/Noema-Atlas-macos-universal.dmg \
            dist/Noema-Atlas-macos-universal.zip \
            --repo noemaai-labs/noema-atlas \
            --clobber

  studio:
    name: Studio macOS universal
    if: inputs.target == 'all' || inputs.target == 'studio'
    runs-on: macos-14
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.88.0
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: crates/studio

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: crates/studio/ui/package-lock.json

      - name: Import Developer ID certificate
        env:
          MACOS_CERT_P12: ${{ secrets.MACOS_CERT_P12 }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          test -n "$MACOS_CERT_P12"
          KEYCHAIN="$RUNNER_TEMP/noema-build.keychain-db"
          security create-keychain -p actions "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p actions "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN"
          echo "$MACOS_CERT_P12" | base64 --decode > "$RUNNER_TEMP/noema-cert.p12"
          security import "$RUNNER_TEMP/noema-cert.p12" -k "$KEYCHAIN" \
            -P "$MACOS_CERT_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k actions "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/noema-cert.p12"
          security find-identity -v -p codesigning "$KEYCHAIN"

      - name: Build, sign, notarize, and package Studio
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGN_IDENTITY }}
          NOTARY_APPLE_ID: ${{ secrets.MACOS_NOTARY_APPLE_ID }}
          NOTARY_PASSWORD: ${{ secrets.MACOS_NOTARY_PASSWORD }}
          NOTARY_TEAM_ID: ${{ secrets.MACOS_NOTARY_TEAM_ID }}
        run: |
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$NOTARY_APPLE_ID"
          test -n "$NOTARY_PASSWORD"
          test -n "$NOTARY_TEAM_ID"

          STUDIO_TOOLCHAIN=1.88.0 \
            bash scripts/bundle-studio.sh \
              --target universal-apple-darwin \
              --bundles app

          BUILT_APP="$(find crates/studio/target/universal-apple-darwin/release/bundle \
            -maxdepth 3 -name '*.app' -print -quit)"
          test -n "$BUILT_APP"
          APP="$RUNNER_TEMP/Noema Atlas Studio.app"
          ditto "$BUILT_APP" "$APP"
          rm -rf crates/studio/target
          codesign --verify --deep --strict --verbose=2 "$APP"

          APP_SUBMISSION="$RUNNER_TEMP/Noema-Atlas-Studio-app.zip"
          ditto -c -k --keepParent "$APP" "$APP_SUBMISSION"
          xcrun notarytool submit "$APP_SUBMISSION" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$APP"
          xcrun stapler validate "$APP"

          STAGING="$RUNNER_TEMP/studio-dmg"
          mkdir -p "$STAGING"
          ditto "$APP" "$STAGING/Noema Atlas Studio.app"
          ln -s /Applications "$STAGING/Applications"
          DMG="Noema-Atlas-Studio-macos-universal.dmg"
          hdiutil create -volname "Noema Atlas Studio" -srcfolder "$STAGING" \
            -ov -format UDZO "$DMG"
          codesign --force --sign "$APPLE_SIGNING_IDENTITY" "$DMG"
          xcrun notarytool submit "$DMG" \
            --apple-id "$NOTARY_APPLE_ID" \
            --password "$NOTARY_PASSWORD" \
            --team-id "$NOTARY_TEAM_ID" \
            --wait
          xcrun stapler staple "$DMG"
          xcrun stapler validate "$DMG"
          spctl -a -vv --type open --context context:primary-signature "$DMG"

      - name: Upload Studio macOS asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release upload "${{ inputs.release_tag }}" \
            Noema-Atlas-Studio-macos-universal.dmg \
            --clobber
