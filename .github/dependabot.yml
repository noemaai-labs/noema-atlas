version: 2
updates:
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    groups:
      rust-workspace:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/crates/studio"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:30"
    open-pull-requests-limit: 5
    groups:
      studio-rust:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/crates/studio/ui"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:00"
    open-pull-requests-limit: 5
    groups:
      studio-ui:
        patterns:
          - "*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "10:30"
    open-pull-requests-limit: 5
    groups:
      github-actions:
        patterns:
          - "*"
