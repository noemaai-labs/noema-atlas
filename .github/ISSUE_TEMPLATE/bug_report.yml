name: Bug report
description: Report a reproducible problem in Noema Atlas.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Do not report suspected vulnerabilities here. Use the confidential reporting path in SECURITY.md.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Core engine
        - CLI
        - Native Atlas desktop app
        - Studio desktop app
        - P2P / Iroh / LAN discovery
        - Registry / manifests
        - Installers / packaging
        - Documentation
        - Other
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: "v0.1.0 or git commit"
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      placeholder: "macOS 15.5 arm64, Windows 11 x64, Ubuntu 24.04, etc."
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps, commands, manifests, and settings needed to reproduce.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove tokens, private tracker URLs, and personal paths before posting.
      render: text
  - type: checkboxes
    id: checks
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This is not a security vulnerability report.
          required: true
